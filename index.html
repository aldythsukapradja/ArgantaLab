<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
<title>ArgantaLab — Build. Learn. Pitch.</title>
<meta name="description" content="Build games. Learn systems. Pitch products." />

<!-- PWA: theme + apple metas -->
<meta name="theme-color" content="#007AFF" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0A0F1A" media="(prefers-color-scheme: dark)" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="ArgantaLab" />
<meta name="mobile-web-app-capable" content="yes" />

<style>
/* ============================================================
   ARGANTALAB — DESIGN SYSTEM
   Premium macOS aesthetic · light default · dark toggle
   ============================================================ */
:root{
  --bg:        #EDEEF2;
  --bg-2:      #F6F7FB;
  --sidebar:   rgba(255,255,255,0.72);
  --card:      rgba(255,255,255,0.78);
  --card-solid:#FFFFFF;
  --glass:     rgba(255,255,255,0.55);
  --border:    rgba(0,0,0,0.08);
  --border-2:  rgba(0,0,0,0.05);
  --t1:        #1C1C1E;
  --t2:        #6C6C70;
  --t3:        #9A9AA0;
  --accent:    #007AFF;
  --accent-2:  #5856D6;
  --accent-3:  #34C759;
  --gold:      #FF9F0A;
  --danger:    #FF3B30;
  --pink:      #FF2D92;
  --cyan:      #32D0E0;
  --shadow-sm: 0 1px 2px rgba(16,24,40,0.06), 0 1px 3px rgba(16,24,40,0.05);
  --shadow-md: 0 4px 12px rgba(16,24,40,0.07), 0 12px 32px rgba(16,24,40,0.06);
  --shadow-lg: 0 20px 60px rgba(16,24,40,0.14);
  --aurora-1:  rgba(0,122,255,0.30);
  --aurora-2:  rgba(88,86,214,0.26);
  --aurora-3:  rgba(50,208,224,0.22);
  --scene-bg:  linear-gradient(160deg,#0B1020,#11182B 60%,#0A0F1A);
  --r-sm: 8px; --r-md: 14px; --r-lg: 20px; --r-xl: 26px; --r-2xl: 34px;
  --ease: cubic-bezier(.22,1,.36,1);
  --ease-2: cubic-bezier(.34,1.56,.64,1);
}
html[data-theme="dark"]{
  --bg:        #000000;
  --bg-2:      #0A0A0C;
  --sidebar:   rgba(28,28,30,0.72);
  --card:      rgba(34,34,38,0.78);
  --card-solid:#1C1C1E;
  --glass:     rgba(44,44,48,0.55);
  --border:    rgba(255,255,255,0.10);
  --border-2:  rgba(255,255,255,0.06);
  --t1:        #FFFFFF;
  --t2:        #9A9AA0;
  --t3:        #6C6C70;
  --accent:    #0A84FF;
  --accent-2:  #7D7AFF;
  --accent-3:  #30D158;
  --gold:      #FFD60A;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
  --shadow-md: 0 8px 28px rgba(0,0,0,0.5);
  --shadow-lg: 0 24px 70px rgba(0,0,0,0.6);
  --aurora-1:  rgba(10,132,255,0.30);
  --aurora-2:  rgba(125,122,255,0.26);
  --aurora-3:  rgba(50,208,224,0.18);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--t1);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background .5s var(--ease),color .35s var(--ease);
  letter-spacing:-0.01em;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:20px;border:3px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:var(--t3);background-clip:padding-box}

/* ---------- AURORA BACKDROP ---------- */
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.aurora i{position:absolute;border-radius:50%;filter:blur(90px);opacity:.9;mix-blend-mode:normal;animation:drift 22s var(--ease) infinite alternate}
.aurora i:nth-child(1){width:46vw;height:46vw;background:var(--aurora-1);top:-12%;left:-8%}
.aurora i:nth-child(2){width:42vw;height:42vw;background:var(--aurora-2);bottom:-16%;right:-10%;animation-delay:-7s;animation-duration:28s}
.aurora i:nth-child(3){width:34vw;height:34vw;background:var(--aurora-3);top:38%;left:48%;animation-delay:-13s;animation-duration:25s}
@keyframes drift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(6vw,5vh) scale(1.12)}100%{transform:translate(-5vw,-4vh) scale(1.04)}}

/* ---------- APP SHELL ---------- */
#app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}
.topbar{
  height:56px;flex:none;display:flex;align-items:center;gap:14px;padding:0 18px;
  background:var(--sidebar);backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);
  border-bottom:1px solid var(--border);z-index:30;
}
.brand{display:flex;align-items:center;gap:11px;font-weight:700;font-size:17px;letter-spacing:-0.02em}
.brand .name b{background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;background-clip:text;color:transparent}
.topbar .spacer{flex:1}
.tb-user{display:flex;align-items:center;gap:12px}
.tb-stats{display:flex;flex-direction:column;align-items:flex-end;gap:3px;line-height:1}
.tb-stats .nm{font-size:12.5px;font-weight:650}
.tb-stats .nm small{color:var(--t2);font-weight:500;margin-left:6px}
.xpbar{width:130px;height:6px;border-radius:20px;background:var(--border);overflow:hidden}
.xpbar i{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--cyan));transition:width 1s var(--ease)}
.icon-btn{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:var(--card);border:1px solid var(--border);transition:.25s var(--ease)}
.icon-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-weight:700;font-size:15px;box-shadow:var(--shadow-sm)}

.shell{flex:1;display:flex;min-height:0}
.drawer{
  width:236px;flex:none;padding:18px 12px;overflow-y:auto;
  background:var(--sidebar);backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px);
  border-right:1px solid var(--border);display:flex;flex-direction:column;gap:4px;
}
.nav-label{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--t3);text-transform:uppercase;padding:14px 12px 6px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r-md);font-size:14.5px;font-weight:550;color:var(--t2);transition:.2s var(--ease);position:relative}
.nav-item svg{width:21px;height:21px;flex:none;stroke-width:1.7}
.nav-item:hover{background:var(--card);color:var(--t1)}
.nav-item.on{background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 16%,transparent),transparent);color:var(--accent);font-weight:650}
.nav-item.on::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--accent)}
.drawer .grow{flex:1}

.main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;scroll-behavior:smooth}
.main-inner{max-width:1080px;margin:0 auto;padding:28px 32px 64px}
.side{
  width:330px;flex:none;padding:22px;overflow-y:auto;
  background:var(--sidebar);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-left:1px solid var(--border);
}

/* ---------- TYPE ---------- */
.page-head{margin-bottom:22px}
.page-head h1{font-size:30px;font-weight:780;letter-spacing:-0.03em}
.page-head p{color:var(--t2);font-size:15px;margin-top:4px}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.section-title{font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--t2);margin:26px 0 12px;display:flex;align-items:center;gap:8px}

/* ---------- CARDS ---------- */
.card{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
.glass{background:var(--glass);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px)}
.pad{padding:20px}

/* profile banner */
.banner{position:relative;overflow:hidden;border-radius:var(--r-2xl);padding:26px 28px;color:#fff;background:linear-gradient(125deg,var(--accent),var(--accent-2) 70%,var(--pink));box-shadow:var(--shadow-lg)}
.banner::after{content:"";position:absolute;inset:0;background:radial-gradient(600px 300px at 80% -20%,rgba(255,255,255,.35),transparent 60%);pointer-events:none}
.banner .hi{font-size:24px;font-weight:760;letter-spacing:-0.02em}
.banner .role{opacity:.92;font-weight:550;margin-top:2px;font-size:14px}
.banner .xpwrap{margin:18px 0 14px;max-width:420px}
.banner .xptrack{height:10px;border-radius:20px;background:rgba(255,255,255,.25);overflow:hidden}
.banner .xptrack i{display:block;height:100%;border-radius:20px;background:#fff;box-shadow:0 0 16px rgba(255,255,255,.6);transition:width 1.1s var(--ease)}
.banner .pills{display:flex;gap:10px;flex-wrap:wrap}
.bpill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);padding:7px 13px;border-radius:20px;font-size:13px;font-weight:600;backdrop-filter:blur(6px)}
.banner .av{position:absolute;right:26px;top:24px;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:26px;border:2px solid rgba(255,255,255,.4)}

/* featured hero */
.hero{position:relative;overflow:hidden;border-radius:var(--r-2xl);min-height:220px;padding:28px;display:flex;flex-direction:column;justify-content:flex-end;color:#fff;background:var(--scene-bg);box-shadow:var(--shadow-lg);cursor:pointer}
.hero .glow{position:absolute;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(80,160,255,.55),transparent 60%);filter:blur(20px);pointer-events:none;transition:transform .18s ease;top:-120px;left:-60px}
.hero .stars{position:absolute;inset:0;background-image:radial-gradient(1.5px 1.5px at 20% 30%,#fff,transparent),radial-gradient(1.5px 1.5px at 70% 60%,#cfe6ff,transparent),radial-gradient(1px 1px at 40% 80%,#fff,transparent),radial-gradient(1.5px 1.5px at 85% 25%,#fff,transparent),radial-gradient(1px 1px at 55% 15%,#bcd,transparent);opacity:.7}
.hero .live{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#7CFFB2;margin-bottom:10px}
.hero .live .dot{width:8px;height:8px;border-radius:50%;background:#34C759;box-shadow:0 0 0 0 rgba(52,199,89,.7);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,199,89,.6)}70%{box-shadow:0 0 0 10px rgba(52,199,89,0)}100%{box-shadow:0 0 0 0 rgba(52,199,89,0)}}
.hero h2{font-size:30px;font-weight:800;letter-spacing:-0.03em;position:relative}
.hero p{opacity:.85;margin:6px 0 16px;max-width:440px;position:relative}
.hero .cta{display:flex;gap:12px;flex-wrap:wrap;position:relative}
.hero .tags{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;position:relative}
.tag{font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:20px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2)}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 18px;border-radius:var(--r-md);font-size:14.5px;font-weight:650;transition:.22s var(--ease);white-space:nowrap}
.btn svg{width:17px;height:17px}
.btn-primary{background:#fff;color:#0B1020}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.3)}
.btn-ghost{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25)}
.btn-ghost:hover{background:rgba(255,255,255,.24)}
.btn-accent{background:var(--accent);color:#fff;box-shadow:var(--shadow-sm)}
.btn-accent:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);filter:brightness(1.05)}
.btn-soft{background:var(--card);color:var(--t1);border:1px solid var(--border)}
.btn-soft:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn-block{width:100%;justify-content:center}

/* game grid */
.grid{display:grid;gap:16px}
.grid.g4{grid-template-columns:repeat(4,1fr)}
.grid.g3{grid-template-columns:repeat(3,1fr)}
.grid.g2{grid-template-columns:repeat(2,1fr)}
.gcard{border-radius:var(--r-lg);overflow:hidden;background:var(--card);border:1px solid var(--border);transition:.28s var(--ease);cursor:pointer;box-shadow:var(--shadow-sm)}
.gcard:hover{transform:translateY(-4px) scale(1.01);box-shadow:var(--shadow-lg)}
.gcard .thumb{height:128px;position:relative;overflow:hidden;display:grid;place-items:center}
.gcard .thumb svg{width:100%;height:100%}
.gcard .body{padding:14px 16px}
.gcard .body h3{font-size:15.5px;font-weight:700}
.gcard .body span{font-size:12.5px;color:var(--t2)}
.gcard .play{margin-top:10px;display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:650;color:var(--accent)}
.gcard.add{display:grid;place-items:center;border-style:dashed;color:var(--t2);min-height:182px}
.gcard.add:hover{color:var(--accent);border-color:var(--accent)}

/* lesson module cards */
.mod{position:relative;border-radius:var(--r-xl);padding:22px;background:var(--card);border:1px solid var(--border);transition:.28s var(--ease);overflow:hidden;box-shadow:var(--shadow-sm)}
.mod:not(.locked){cursor:pointer}
.mod:not(.locked):hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.mod .num{position:absolute;top:18px;right:20px;font-size:34px;font-weight:800;color:var(--border);letter-spacing:-0.04em}
.mod .ic{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 18%,transparent),color-mix(in srgb,var(--accent-2) 14%,transparent));margin-bottom:14px}
.mod .ic svg{width:28px;height:28px;color:var(--accent)}
.mod h3{font-size:17px;font-weight:740;letter-spacing:-0.02em}
.mod p{font-size:13.5px;color:var(--t2);margin-top:5px;line-height:1.45}
.mod .foot{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px solid var(--border-2)}
.mod .xpchip{font-size:12px;font-weight:700;color:var(--gold)}
.mod .startlink{font-size:13.5px;font-weight:650;color:var(--accent);display:inline-flex;align-items:center;gap:5px}
.mod.locked{opacity:.62}
.mod.locked .ic{background:var(--border)}.mod.locked .ic svg{color:var(--t3)}
.mod.done{border-color:color-mix(in srgb,var(--accent-3) 50%,var(--border))}
.mod .donechip{font-size:12px;font-weight:700;color:var(--accent-3);display:inline-flex;align-items:center;gap:5px}

/* progress bar generic */
.prog{height:8px;border-radius:20px;background:var(--border);overflow:hidden;margin-top:10px}
.prog i{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--cyan));transition:width 1s var(--ease)}

/* cinematic scene frame */
.scene{position:relative;border-radius:var(--r-2xl);height:330px;overflow:hidden;background:var(--scene-bg);box-shadow:var(--shadow-lg);display:grid;place-items:center;color:#fff}
.scene .sky{position:absolute;inset:0;background-image:radial-gradient(1.5px 1.5px at 15% 20%,#fff,transparent),radial-gradient(1px 1px at 75% 35%,#cde,transparent),radial-gradient(1.5px 1.5px at 45% 70%,#fff,transparent),radial-gradient(1px 1px at 85% 80%,#fff,transparent),radial-gradient(1.5px 1.5px at 30% 90%,#bcd,transparent);opacity:.6}
.scene .ctrls{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:5}
.mini-btn{padding:8px 14px;border-radius:20px;font-size:12.5px;font-weight:650;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);color:#fff;backdrop-filter:blur(6px);transition:.2s}
.mini-btn:hover{background:rgba(255,255,255,.26)}

/* explanation chips */
.exgrid{display:grid;gap:14px;margin-top:18px}
.exchip{padding:16px 18px;border-radius:var(--r-lg);background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.exchip .e{font-size:24px;margin-bottom:6px}
.exchip h4{font-size:14.5px;font-weight:700}
.exchip p{font-size:13px;color:var(--t2);margin-top:3px}

/* step navigator */
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin:22px 0 18px}
.steps .node{display:flex;flex-direction:column;align-items:center;gap:7px;position:relative;flex:1}
.steps .dot{width:14px;height:14px;border-radius:50%;background:var(--border);border:2px solid var(--card-solid);z-index:2;transition:.3s}
.steps .node.on .dot{background:var(--accent);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 25%,transparent)}
.steps .node.done .dot{background:var(--accent-3)}
.steps .node span{font-size:11.5px;color:var(--t2);font-weight:600}
.steps .node.on span{color:var(--accent)}
.steps .bar{position:absolute;top:6px;left:50%;width:100%;height:2px;background:var(--border);z-index:1}
.steps .node.done .bar{background:var(--accent-3)}
.nav-row{display:flex;justify-content:space-between;gap:12px;margin-top:14px}

/* side panel */
.sp-block{margin-bottom:22px}
.sp-h{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--t2);display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sp-h .d{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.sp-body{font-size:13.5px;color:var(--t1);line-height:1.5}
.vocab{display:flex;flex-direction:column;gap:8px}
.vrow{display:flex;align-items:baseline;gap:8px;font-size:13px}
.vrow b{color:var(--accent);font-weight:650;min-width:62px}
.vrow span{color:var(--t2)}
.mission{display:flex;flex-direction:column;gap:9px}
.mrow{display:flex;align-items:center;gap:10px;font-size:13.5px;cursor:pointer;user-select:none}
.mrow .box{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);flex:none;display:grid;place-items:center;transition:.2s}
.mrow.ck .box{background:var(--accent-3);border-color:var(--accent-3)}
.mrow.ck .box svg{opacity:1}
.mrow .box svg{width:13px;height:13px;color:#fff;opacity:0;transition:.2s}
.mrow.ck span{color:var(--t3);text-decoration:line-through}
.note-area{width:100%;min-height:80px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--bg-2);padding:11px;font:inherit;font-size:13px;color:var(--t1);resize:vertical}
.spline{height:1px;background:var(--border);margin:18px 0}

/* stat tiles */
.stats-row{display:grid;gap:14px}
.stat{padding:18px;border-radius:var(--r-lg);background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.stat .lbl{font-size:12.5px;color:var(--t2);font-weight:600}
.stat .val{font-size:30px;font-weight:800;letter-spacing:-0.03em;margin-top:4px}
.stat .delta{font-size:12px;font-weight:650;color:var(--accent-3);margin-top:2px}

/* game player */
.player-bar{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.player-bar .now{font-weight:700;font-size:16px}
.player-bar .now small{color:var(--t2);font-weight:500;display:block;font-size:12px}
.frame-wrap{border-radius:var(--r-xl);overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow-lg);background:#000}
.frame-wrap iframe{width:100%;height:66vh;border:none;display:block}
.howbox{margin-top:16px;padding:18px;border-radius:var(--r-lg);background:var(--card);border:1px solid var(--border)}
.howbox h4{font-size:14px;font-weight:700;margin-bottom:6px}
.howbox p{font-size:13.5px;color:var(--t2)}
.code{display:inline-block;margin-top:10px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;background:var(--bg-2);border:1px solid var(--border);padding:8px 12px;border-radius:8px;color:var(--accent)}

/* try-it / interactive */
.tryit{margin-top:18px;padding:20px;border-radius:var(--r-lg);background:var(--card);border:1px solid var(--border)}
.field{margin-bottom:12px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--t2);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--bg-2);font:inherit;font-size:14px;color:var(--t1)}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent)}
.result-box{margin-top:14px;padding:16px;border-radius:var(--r-md);background:var(--bg-2);border:1px dashed var(--border);font-size:13.5px;line-height:1.5}
.slider{width:100%;-webkit-appearance:none;height:6px;border-radius:20px;background:var(--border);outline:none}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--accent);box-shadow:var(--shadow-sm);cursor:pointer}
.gauge{font-size:40px;font-weight:850;letter-spacing:-0.04em}

/* bottom dock (mobile / ipad) */
.dock{display:none;position:fixed;bottom:0;left:0;right:0;z-index:40;
  padding:8px 14px calc(8px + env(safe-area-inset-bottom));
  background:var(--sidebar);backdrop-filter:blur(28px) saturate(1.8);-webkit-backdrop-filter:blur(28px);
  border-top:1px solid var(--border)}
.dock-row{display:flex;justify-content:space-around;align-items:center;max-width:520px;margin:0 auto}
.dock-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--t3);font-size:10.5px;font-weight:600;padding:6px 4px;border-radius:14px;transition:.2s;flex:1}
.dock-item svg{width:24px;height:24px;stroke-width:1.8}
.dock-item.on{color:var(--accent)}
.dock-item.on svg{transform:translateY(-1px)}

/* toast + modal */
.toast-wrap{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:10px;align-items:center}
.toast{padding:12px 20px;border-radius:30px;background:var(--card-solid);border:1px solid var(--border);box-shadow:var(--shadow-lg);font-size:14px;font-weight:600;display:flex;align-items:center;gap:10px;animation:toastin .4s var(--ease-2)}
.toast .e{font-size:18px}
@keyframes toastin{from{opacity:0;transform:translateY(-14px) scale(.95)}to{opacity:1;transform:none}}
.overlay{position:fixed;inset:0;z-index:80;background:rgba(10,12,20,.5);backdrop-filter:blur(8px);display:grid;place-items:center;animation:fade .3s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{width:min(420px,90vw);text-align:center;padding:34px 28px;border-radius:var(--r-2xl);background:var(--card-solid);border:1px solid var(--border);box-shadow:var(--shadow-lg);animation:pop .55s var(--ease-2)}
@keyframes pop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
.badge-art{width:96px;height:96px;margin:0 auto 18px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--gold),#FF7A00);box-shadow:0 12px 40px rgba(255,159,10,.45)}
.badge-art svg{width:50px;height:50px;color:#fff}
.modal h3{font-size:22px;font-weight:800;letter-spacing:-0.02em}
.modal .sub{color:var(--t2);margin:6px 0 4px;font-size:14px}
.modal .bname{font-size:18px;font-weight:750;color:var(--gold);margin:10px 0 22px}

/* confetti */
.confetti{position:fixed;inset:0;z-index:85;pointer-events:none;overflow:hidden}
.confetti i{position:absolute;width:9px;height:14px;top:-20px;border-radius:2px;animation:fall 2.4s linear forwards}
@keyframes fall{to{transform:translateY(105vh) rotate(640deg);opacity:.9}}

/* charts */
.chart-card{padding:18px;border-radius:var(--r-lg);background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.chart-card h4{font-size:13.5px;font-weight:700;margin-bottom:12px;color:var(--t2)}
.insight{margin-top:16px;padding:18px;border-radius:var(--r-lg);background:linear-gradient(120deg,color-mix(in srgb,var(--accent) 12%,transparent),color-mix(in srgb,var(--accent-2) 8%,transparent));border:1px solid color-mix(in srgb,var(--accent) 30%,var(--border))}
.insight .h{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:7px;margin-bottom:8px}
.insight p{font-size:14px;line-height:1.5}
table.data{width:100%;border-collapse:collapse;font-size:13.5px}
table.data th{text-align:left;padding:10px 12px;color:var(--t2);font-weight:650;font-size:12px;text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--border)}
table.data td{padding:11px 12px;border-bottom:1px solid var(--border-2)}
table.data tr:last-child td{border-bottom:none}

/* demo stage */
.stage{position:relative;border-radius:var(--r-2xl);min-height:460px;overflow:hidden;background:radial-gradient(120% 80% at 50% 0%,#1b2440,#0A0F1A);box-shadow:var(--shadow-lg);display:grid;place-items:center;color:#fff;text-align:center}
.stage canvas{position:absolute;inset:0;width:100%;height:100%}
.stage .slide{position:relative;z-index:3;padding:40px;max-width:560px}
.stage .dots{position:absolute;top:18px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:4}
.stage .dots i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);transition:.3s}
.stage .dots i.on{background:#fff;width:22px;border-radius:20px}
.stage .nav{position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:12px;z-index:4}

.fade-in{animation:fadeUp .5s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.stagger>*{animation:fadeUp .5s var(--ease) both}
.stagger>*:nth-child(2){animation-delay:.05s}
.stagger>*:nth-child(3){animation-delay:.1s}
.stagger>*:nth-child(4){animation-delay:.15s}
.stagger>*:nth-child(5){animation-delay:.2s}

/* ---------- RESPONSIVE ---------- */
@media(max-width:1180px){.side{display:none}}
@media(max-width:920px){
  .drawer{display:none}
  .dock{display:block}
  .main{padding-bottom:80px}
  .main-inner{padding:20px 18px 90px}
  .grid.g4{grid-template-columns:repeat(2,1fr)}
  .grid.g3{grid-template-columns:repeat(2,1fr)}
  .page-head h1{font-size:25px}
  .tb-stats{display:none}
}
@media(max-width:560px){
  .grid.g4,.grid.g3,.grid.g2{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr)!important}
  .hero h2{font-size:24px}
  .frame-wrap iframe{height:72vh}
}
@media(min-width:921px) and (max-width:1180px){
  /* iPad landscape: keep drawer hidden, dock visible already handled <920 */
}
.hidden{display:none!important}

/* ---------- TOAST ---------- */
function toast(msg,emoji){
  const t=document.createElement('div');t.className='toast';
  t.innerHTML=(emoji?'<span class="e">'+emoji+'</span>':'')+msg;
  $('#toasts').appendChild(t);
  setTimeout(()=>{t.style.transition='.4s';t.style.opacity='0';t.style.transform='translateY(-10px)';setTimeout(()=>t.remove(),400)},2200);
}

function checkBadges(){
  const done=Store.get('completedLessons'), have=Store.get('badges');

function confettiBurst(){
  const c=document.createElement('div');c.className='confetti';
  const cols=['#007AFF','#5856D6','#FF9F0A','#34C759','#FF2D92','#32D0E0'];
  for(let i=0;i<70;i++){const p=document.createElement('i');

function heatmap(){
  const days=['M','T','W','T','F','S','S'];let cells='';
  for(let d=0;d<7;d++){const v=[3,2,4,1,5,3,2][d];cells+=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:30px;height:30px;border-radius:8px;background:color-mix(in srgb,var(--accent) ${v*18}%,var(--bg-2))"></div><span style="font-size:10px;color:var(--t3)">${days[d]}</span></div>`;}
  return '<div style="display:flex;gap:8px;justify-content:space-between;padding:10px 0">'+cells+'</div>';
}

  // count-up numbers
  document.querySelectorAll('[data-count]').forEach(el=>{
    const target=+el.dataset.count,suffix=el.dataset.suffix||'';let cur=0;const dur=900,t0=performance.now();
    function tick(t){const p=Math.min(1,(t-t0)/dur);cur=Math.round(target*(1-Math.pow(1-p,3)));el.textContent=cur+suffix;if(p<1)requestAnimationFrame(tick);}
    requestAnimationFrame(tick);
  });
  // hero pointer glow
  const hero=$('#hero'),glow=$('#heroGlow');
  if(hero&&glow){hero.addEventListener('pointermove',e=>{const r=hero.getBoundingClientRect();glow.style.transform='translate('+(e.clientX-r.left-130)+'px,'+(e.clientY-r.top-60)+'px)';});}
  // demo stage particles
  const cv=$('#stageFx');if(cv)startStageFx(cv);
}

let fxRAF;
function startStageFx(canvas){
  cancelAnimationFrame(fxRAF);
  const ctx=canvas.getContext('2d');function size(){canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;}size();
  const N=60,ps=Array.from({length:N},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.8+.4,s:Math.random()*.4+.1}));
  function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);
    const g=ctx.createRadialGradient(canvas.width/2,40,10,canvas.width/2,40,canvas.height);g.addColorStop(0,'rgba(120,160,255,.18)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='rgba(255,255,255,.7)';ps.forEach(p=>{p.y-=p.s;if(p.y<0){p.y=canvas.height;p.x=Math.random()*canvas.width;}ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();});
    fxRAF=requestAnimationFrame(draw);}
  draw();
}

/* ============================================================
   EVENT DELEGATION
   ============================================================ */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-action]');if(!t)return;
  const a=t.dataset.action;
  switch(a){
    case 'tab':go({tab:t.dataset.tab,page:'home',lessonId:null,gameId:null,step:0,slide:0});break;
    case 'back-tab':go({tab:t.dataset.tab,lessonId:null,gameId:null,step:0});break;
    case 'open-game':go({gameId:t.dataset.game});break;
    case 'exit-game':go({gameId:null});break;
    case 'open-lesson':go({lessonId:t.dataset.lesson,gameId:null,step:0,slide:0});break;
    case 'toggle-theme':toggleTheme();break;
    case 'replay':renderMain();break;
    case 'toast':toast(t.dataset.msg,'🚧');break;
    case 'close-modal':$('#modalRoot').innerHTML='';break;
    case 'step':{const L=LESSONS[ROUTE.lessonId];let s=ROUTE.step+ +t.dataset.dir;s=Math.max(0,Math.min(L.steps.length-1,s));go({step:s});break;}
    case 'mission':{const id=ROUTE.lessonId,i=+t.dataset.i;const m={...Store.get('missions')};const arr=new Set(m[id]||[]);arr.has(i)?arr.delete(i):arr.add(i);m[id]=[...arr];Store.set({missions:m});renderSide();break;}
    case 'complete':completeLesson(t.dataset.lesson);break;
    case 'prompt-gen':{const v=id=>($('#'+id).value||$('#'+id).placeholder);$('#pbOut').innerHTML='<b>Create '+v('pb1')+' for '+v('pb2')+'.</b><br>The goal is to '+v('pb3')+'.<br>Single HTML file. Design first, then build.<br><button class="btn btn-soft" style="margin-top:10px" data-action="toast" data-msg="Copied!">Copy</button>';break;}
    case 'stats-calc':statsCalc();break;
    case 'chart-tab':chartTab(t);break;
    case 'slide':{let s=(ROUTE.slide||0)+ +t.dataset.dir;s=Math.max(0,Math.min(SLIDES.length-1,s));go({slide:s});break;}
    case 'finish-demo':if(!Store.get('pitchCompleted')){Store.set({pitchCompleted:true});addXp(40);}confettiBurst();toast('Presentation complete!','🎉');break;
    case 'save-pitch':Store.set({pitchScript:$('#pitchText').value});toast('Script saved','💾');break;
    case 'predict-live':break;
  }
});
document.addEventListener('input',e=>{
  if(e.target.closest('[data-action="predict-live"]')||['sAcc','sStk','sDth','sWpn'].includes(e.target.id))predictLive();
});

function completeLesson(id){
  const done=Store.get('completedLessons');
  if(!done.includes(id)){Store.set({completedLessons:[...done,id]});addXp(LESSONS[id].xp);toast(LESSONS[id].title+' complete!','🏅');checkBadges();}
  else{go({step:0});return;}
  go({lessonId:null,tab:LESSONS[id].tab});
}
function statsCalc(){
  const col=$('#seCol').value,fn=$('#seFn').value,vals=SAMPLE.map(d=>d[col]);
  let r,exp;const sum=vals.reduce((a,b)=>a+b,0);
  if(fn==='avg'){r=Math.round(sum/vals.length);exp='We added all '+col+' and divided by '+vals.length+' matches.';}
  else if(fn==='sum'){r=sum;exp='We added every '+col+' value together.';}
  else if(fn==='max'){r=Math.max(...vals);exp='The single highest '+col+' value.';}
  else{r=Math.min(...vals);exp='The single lowest '+col+' value.';}
  $('#seOut').innerHTML='<b style="font-size:18px">'+fn.toUpperCase()+' '+col+' = '+r+'</b><br><span style="color:var(--t2)">'+exp+'</span>';
}
function chartTab(btn){
  const type=btn.dataset.type;
  document.querySelectorAll('#cmTabs .mini-btn').forEach(b=>{b.style.borderColor='var(--border)';b.style.color='var(--t1)';});
  btn.style.borderColor='var(--accent)';btn.style.color='var(--accent)';
  $('#cmChart').innerHTML=type==='line'?lineChart():type==='bar'?barChart():'<div style="display:grid;place-items:center;padding:8px">'+donutChart()+'</div>';
  $('#cmInsight').textContent=type==='line'?'Coins trend upward — Match 3 was your best run.':type==='bar'?'Marksman wins most often — it is your strongest weapon.':'Marksman makes up half of all match wins.';
}
function predictLive(){
  const acc=+$('#sAcc').value,stk=+$('#sStk').value,dth=+$('#sDth').value,wpn=+$('#sWpn').value;
  $('#pAcc').textContent=acc;$('#pStk').textContent=stk;$('#pDth').textContent=dth;
  let score=acc*0.5 + stk*3 + (10-dth)*2 + wpn*4;score=Math.max(0,Math.min(100,Math.round(score*0.7)));
  const g=$('#pGauge'),v=$('#pVerdict'),ad=$('#pAdvice');
  g.textContent=score+'%';
  if(score>=70){g.style.color='var(--accent-3)';v.textContent='✅ HIGH win chance';ad.textContent='Great setup — keep your streak going!';}
  else if(score>=45){g.style.color='var(--gold)';v.textContent='⚠️ MEDIUM win chance';ad.textContent='Reduce deaths or pick a stronger weapon.';}
  else{g.style.color='var(--danger)';v.textContent='❌ LOW win chance';ad.textContent='Try the Marksman and improve accuracy.';}
}

/* ---------- SUBSCRIPTIONS ---------- */
Store.sub(()=>{renderNav();});

   PWA — manifest (inline) + service worker
   ============================================================ */
(function installPWA(){
  $('#brandLogo').innerHTML=LOGO;
  applyTheme();
  // inline manifest via blob
  const iconSvg=encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" rx="120" fill="#007AFF"/><path d="M256 130l104 60v120l-104 60-104-60V190z" fill="rgba(255,255,255,.18)" stroke="#fff" stroke-width="14" stroke-linejoin="round"/><circle cx="256" cy="256" r="30" fill="#fff"/></svg>');
  const manifest={name:'ArgantaLab',short_name:'ArgantaLab',description:'Build games. Learn systems. Pitch products.',start_url:'./index.html',display:'standalone',background_color:'#EDEEF2',theme_color:'#007AFF',orientation:'any',icons:[{src:'data:image/svg+xml,'+iconSvg,sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}]};
  try{const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});const link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(blob);document.head.appendChild(link);}catch(e){}
  // service worker (offline). Prefer external sw.js if present; fallback to inline blob.
  if('serviceWorker' in navigator){
    const swCode=`const C='argantalab-v1';self.addEventListener('install',e=>{self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim())});self.addEventListener('fetch',e=>{e.respondWith(caches.open(C).then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(e.request.method==='GET'&&res.ok){c.put(e.request,res.clone())}return res}).catch(()=>r))))});`;
    navigator.serviceWorker.register('sw.js').catch(()=>{
      try{const b=new Blob([swCode],{type:'text/javascript'});navigator.serviceWorker.register(URL.createObjectURL(b)).catch(()=>{});}catch(e){}
    });
  }
})();

/* ---------- BOOT ---------- */
renderNav();renderMain();renderSide();
</script>
